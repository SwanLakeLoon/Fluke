name: Nightly ICE Refresh

on:
  schedule:
    - cron: '0 10 * * *'   # 4:00 AM CST (UTC−6) = 10:00 AM UTC
  workflow_dispatch:         # allow manual trigger from the Actions tab

jobs:
  ice-refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Run ICE refresh
        run: uv run scripts/ice_refresh.py
        env:
          POCKETBASE_URL:      ${{ secrets.POCKETBASE_URL }}
          PB_ADMIN_EMAIL:      ${{ secrets.PB_ADMIN_EMAIL }}
          PB_ADMIN_PASS:       ${{ secrets.PB_ADMIN_PASS }}
          DEFROST_PASSWORD:    ${{ secrets.DEFROST_PASSWORD }}
          DEFROST_CONCURRENCY: "5"
